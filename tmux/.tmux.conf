# remap prefix from 'C-b' to 'C-space'
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# More intuitive split commands using | and - (vertical and horizontal)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file $HOME/.tmux.conf \; display-message "Config reloaded!"

# switch panes using Alt-arrow without prefix
bind h select-pane -L
bind l select-pane -R
bind k select-pane -U
bind j select-pane -D

# Resize panes with prefix + Ctrl + h/j/k/l
bind -r C-h resize-pane -L 5
bind -r C-l resize-pane -R 5
bind -r C-k resize-pane -U 5
bind -r C-j resize-pane -D 5

# don't rename windows automatically
set-option -g allow-rename off

# use 1 based indexing in panes
set -g base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on # Renumber windows automatically when one is closed

# dont detach on session close
set-option -g detach-on-destroy off

# use colors
set -g default-terminal "screen-256color"

# Increase the scrollback history limit to 10000 lines (default is 2000)
set -g history-limit 10000

# Enable mouse support for scrolling, resizing panes, and selecting windows
set -g mouse on

# Set the default terminal type to support 256 colors
set -g default-terminal "screen-256color"


# DESIGN TWEAKS

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
setw -g clock-mode-colour yellow

# copy mode
setw -g mode-style 'fg=black bg=red bold'

# panes
set -g pane-border-style 'fg=red'
set -g pane-active-border-style 'fg=red'

# statusbar
set -g status-position top
set -g status-justify left
set -g status-style 'fg=red bold'

set -g status-left '#S | '
set -g status-left-length 30

set -g status-right-style 'fg=red bold'
set -g status-right '%Y-%m-%d %H:%M '
set -g status-right-length 50

setw -g window-status-current-style 'fg=black bg=red'
setw -g window-status-current-format ' #I #W '

setw -g window-status-style 'fg=red bg=black'
setw -g window-status-format ' #I #[fg=white]#W '

setw -g window-status-bell-style 'fg=yellow bg=red bold'

# messages
set -g message-style 'fg=black bg=red bold'



# PLUGINS
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# set -g @plugin 'laktak/extrakto'
# set -g @plugin 'fcsonline/tmux-thumbs'
# run-shell ~/.tmux/plugins/tmux-thumbs/tmux-thumbs.tmux

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

